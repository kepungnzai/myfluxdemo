apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cm
spec:
  releaseName: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: 'v1.13.x'
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  interval: 1h
  install:
    createNamespace: true
  values:
    installCRDs: true # Crucial for cert-manager to work!
